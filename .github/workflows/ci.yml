name: CI

on:
  push:
  pull_request:

jobs:
  test-and-release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run Tests
        run: make test

      - name: Build Release Artifacts
        run: make release

      - name: Upload Darwin AArch64 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-host-proxy-static-darwin-aarch64
          path: build/bin/release/ssh-host-proxy-static-darwin-aarch64
          if-no-files-found: error

      - name: Upload Linux AArch64 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-host-proxy-static-linux-aarch64
          path: build/bin/release/ssh-host-proxy-static-linux-aarch64
          if-no-files-found: error

      - name: Upload Linux X86_64 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-host-proxy-static-linux-x86_64
          path: build/bin/release/ssh-host-proxy-static-linux-x86_64
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/release/*
          generate_release_notes: true
