name: CI

on:
  push:
  pull_request:

jobs:
  test-and-release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run Tests
        run: make test

      - name: Build Release Artifacts
        run: make release

      - name: Stage GitHub Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        run: make release-assets

      - name: Upload Darwin ARM64 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-host-proxy-static-darwin-arm64
          path: build/darwin-arm64/bin/ssh-host-proxy-static
          if-no-files-found: error

      - name: Upload Linux ARM64 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-host-proxy-static-linux-arm64
          path: build/linux-arm64/bin/ssh-host-proxy-static
          if-no-files-found: error

      - name: Upload Linux AMD64 Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-host-proxy-static-linux-amd64
          path: build/linux-amd64/bin/ssh-host-proxy-static
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release-assets/ssh-host-proxy-static-darwin-arm64
            build/release-assets/ssh-host-proxy-static-linux-arm64
            build/release-assets/ssh-host-proxy-static-linux-amd64
          generate_release_notes: true
